<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6VSVYZBW4R"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6VSVYZBW4R');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe Engineer</title>
    <style>
        :root {
            --bg-color: #fff9c4; 
            --card-bg: #ffffff;
            --accent: #ff2449;
            --title-green: #2e7d32;
            --info-green: #4CAF50;
            --text-color: #212121;
            --text-secondary: #eeeeee;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; overflow-x: hidden; }
        header { padding: 20px; background: #fbc02d; border-bottom: 2px solid var(--accent); text-align: center; }
        h1 { margin: 0 0 15px 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; color: var(--title-green); }

        .lang-switch { display: flex; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .lang-btn { background: #fff; border: 1px solid #ccc; color: #333; padding: 8px 20px; border-radius: 12px; font-size: 0.9rem; font-weight: bold; cursor: pointer; }
        .lang-btn.active { border-color: var(--accent) !important; color: var(--accent) !important; background: #ffebee; }

        main { padding: 15px; }
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .game-card { background: var(--card-bg); border: 1px solid #ddd; text-decoration: none; color: inherit; display: block; border-radius: 25px; overflow: hidden; position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .game-img { width: 100%; height: 120px; border-bottom: 1px solid #eee; background-size: cover; background-position: center; background-repeat: no-repeat; }

        .img-star { background-image: url('star-shot.jpg'); }
        .img-tetris { background-image: url('tetris.jpg'); }
        .img-durak { background-image: url('durak.jpg'); }
        .img-pong { background-image: url('pong.jpg'); }

        .game-info { padding: 15px 10px; background: var(--info-green); border-radius: 0 0 25px 25px; color: #ffffff; }
        .game-title { font-weight: bold; font-size: 1.1rem; display: block; margin-bottom: 4px; }
        .game-meta { font-size: 0.8rem; color: var(--text-secondary); font-weight: 500; }

        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        #game-frame { flex-grow: 1; border: none; }
        .close-btn { background: #111; color: #fff; padding: 18px; text-align: center; font-weight: bold; font-size: 1rem; border-bottom: 2px solid var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>UNIVERSE ENGINEER</h1>
    <div class="lang-switch">
        <button id="lang-en" class="lang-btn active">EN</button>
        <button id="lang-ru" class="lang-btn">RU</button>
    </div>
</header>

<main>
    <div class="games-grid">
        <div class="game-card" onclick="openGame('star-shot-elite.html')">
            <div class="game-img img-star"></div>
            <div class="game-info">
                <span class="game-title">Star Shot Elite</span>
                <span id="g1" class="game-meta">Space Shooter</span>
            </div>
        </div>

        <div class="game-card" onclick="openGame('tetris.html')">
            <div class="game-img img-tetris"></div>
            <div class="game-info">
                <span class="game-title">Classic Tetris</span>
                <span id="g2" class="game-meta">Puzzle Game</span>
            </div>
        </div>

        <div class="game-card" onclick="openGame('durak.html')">
            <div class="game-img img-durak"></div>
            <div class="game-info">
                <span class="game-title">Durak</span>
                <span id="g3" class="game-meta">Card Game</span>
            </div>
        </div>

        <div class="game-card" onclick="openGame('pong.html')">
            <div class="game-img img-pong"></div>
            <div class="game-info">
                <span class="game-title">Ping Pong</span>
                <span id="g4" class="game-meta">Arcade Classic</span>
            </div>
        </div>
    </div>
</main>

<div id="game-overlay">
    <div class="close-btn" onclick="closeGame()" id="close-txt">CLOSE GAME</div>
    <iframe id="game-frame"></iframe>
</div>

<script>
    let currentLang = 'en';
    const texts = {
        en: { close: \"CLOSE GAME\", g1: \"Space Shooter\", g2: \"Puzzle Game\", g3: \"Card Game\", g4: \"Arcade Classic\" },
        ru: { close: \"ЗАКРЫТЬ ИГРУ\", g1: \"Космо-шутер\", g2: \"Пазл-игра\", g3: \"Карточная игра\", g4: \"Аркадная классика\" }
    };

    function openGame(url) {
        document.getElementById('game-frame').src = url;
        document.getElementById('game-overlay').style.display = 'flex';
    }

    function closeGame() {
        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('game-frame').src = '';
    }

    function updateLanguageUI() {
        const t = texts[currentLang];
        document.getElementById('close-txt').innerText = t.close;
        document.getElementById('g1').innerText = t.g1;
        document.getElementById('g2').innerText = t.g2;
        document.getElementById('g3').innerText = t.g3;
        document.getElementById('g4').innerText = t.g4;
        
        document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
        document.getElementById('lang-ru').classList.toggle('active', currentLang === 'ru');
    }

    document.getElementById('lang-en').onclick = () => { currentLang='en'; updateLanguageUI(); };
    document.getElementById('lang-ru').onclick = () => { currentLang='ru'; updateLanguageUI(); };

    updateLanguageUI();
</script>
</body>
</html>
