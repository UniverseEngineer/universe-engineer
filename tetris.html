<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TETRIS</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0a1a2a 100%);
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        .game-container {
            width: 100%;
            max-width: 380px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 10px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            background: #0a1f0ad9;
            padding: 6px 12px;
            border-radius: 40px;
        }
        .game-header .title-area h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: none;
            letter-spacing: 2px;
        }
        .lang-switch { display: flex; gap: 6px; }
        .lang-switch button {
            background: #2c2c2c;
            border: none;
            color: white;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
        }
        .lang-switch button.active {
            background: #00ff88;
            color: #0a2f0a;
        }

        .record-banner {
            background: linear-gradient(90deg, #ffaa00, #ff6600);
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            padding: 6px;
            border-radius: 30px;
            margin-bottom: 10px;
            animation: pulse 1s ease;
            display: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); background: #ffaa00; }
            50% { transform: scale(1.02); background: #ff4400; }
            100% { transform: scale(1); background: #ffaa00; }
        }

        .main-game-area {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 10px;
        }

        canvas#boardCanvas {
            background: #0a0f1e;
            border-radius: 10px;
            width: 200px;
            height: 400px;
            border: 2px solid #00ff88;
        }
        .info-panel {
            background: #000000aa;
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            min-width: 80px;
        }
        .info-panel p {
            margin: 4px 0;
            font-size: 11px;
            color: #00ff88;
        }
        canvas#nextCanvas {
            background: #0a0f1e;
            border-radius: 8px;
            width: 70px;
            height: 70px;
            margin: 0 auto;
            display: block;
            border: 1px solid #00ff88;
        }
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #000000aa;
            border-radius: 30px;
            padding: 5px 12px;
            margin-bottom: 10px;
            gap: 6px;
            font-size: 11px;
            color: #e0e0e0;
        }
        .stats-bar button {
            background: #00ff88;
            border: none;
            border-radius: 25px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
        .stats-bar button#logoutBtn { background: #ff4444; color: white; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
            position: relative;
        }
        .ctrl-btn {
            background: #1e2a3e;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 40px;
            cursor: pointer;
            min-width: 55px;
            text-align: center;
            touch-action: manipulation;
            transition: 0.05s linear;
        }
        .ctrl-btn:active {
            transform: scale(0.95);
            background: #00ff88;
            color: #0a0f1e;
        }
        /* Pauzes poga - lielāka, nolikta pa labi */
        .pause-btn-large {
            background: #ffaa00;
            color: #1e3a1e;
            font-size: 24px;
            padding: 8px 20px;
            min-width: 80px;
            order: 10;
            margin-left: auto;
        }
        .ctrl-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .message-area {
            text-align: center;
            margin-top: 8px;
            font-size: 11px;
            background: #00000099;
            border-radius: 25px;
            padding: 5px;
            color: #00ff88;
        }

        .login-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #061a06ea;
            backdrop-filter: blur(12px);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: #1e2a1e;
            padding: 20px;
            border-radius: 35px;
            text-align: center;
            width: 90%;
            max-width: 300px;
            border: 2px solid #00ff88;
        }
        .login-card h2 {
            font-size: 32px;
            font-weight: 900;
            margin: 0 0 15px 0;
            color: #ffffff;
            text-shadow: none;
            letter-spacing: 2px;
        }
        .login-card input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 40px;
            border: none;
            text-align: center;
            background: #2c3a2c;
            color: #00ff88;
        }
        .login-card button {
            background: #00ff88;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
        .leaderboard-box {
            margin-top: 12px;
            background: #00000088;
            border-radius: 16px;
            padding: 8px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 11px;
            color: #00ff88;
        }
        .leaderboard-box h3 { margin: 0 0 5px 0; color: gold; font-size: 12px; }
        @keyframes bang {
            to { transform: scale(2); opacity: 0; }
        }
        .firework {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-panel">
    <div class="login-card">
        <h2>🎮 TETRIS</h2>
        <input type="text" id="loginName" placeholder="Nickname / Имя" autocomplete="off">
        <div><button id="loginBtn">🎮 PLAY / ИГРАТЬ</button></div>
        <div class="leaderboard-box">
            <h3>🏆 TOP PLAYERS / ЛУЧШИЕ</h3>
            <div id="rankListLogin">Loading...</div>
        </div>
    </div>
</div>

<div class="game-container" id="gameUI" style="display:none;">
    <div class="game-header">
        <div class="title-area"><h1>🎮 TETRIS</h1></div>
        <div class="lang-switch">
            <button id="langEnBtn" class="active">EN</button>
            <button id="langRuBtn">RU</button>
        </div>
    </div>
    
    <div id="recordBanner" class="record-banner">🏆 NEW RECORD! / НОВЫЙ РЕКОРД! 🏆</div>
    
    <div class="stats-bar">
        <span>🎮 <span id="winCount">0</span> <span id="gamesText">games</span></span>
        <span>⭐ <span id="scoreText">0</span></span>
        <span>📊 <span id="linesText">0</span></span>
        <span>👤 <span id="userName"></span></span>
        <button id="newGameBtn">🔄</button>
        <button id="logoutBtn">🚪</button>
    </div>
    
    <div class="main-game-area">
        <canvas id="boardCanvas" width="200" height="400"></canvas>
        <div class="info-panel">
            <p>NEXT</p>
            <canvas id="nextCanvas" width="80" height="80"></canvas>
            <p>LVL <span id="levelDisplay">1</span></p>
        </div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="leftBtn">◀</button>
        <button class="ctrl-btn" id="rightBtn">▶</button>
        <button class="ctrl-btn" id="rotateBtn">↻</button>
        <button class="ctrl-btn" id="downBtn">▼</button>
        <button class="ctrl-btn" id="hardDropBtn">⬇⬇</button>
        <button class="ctrl-btn pause-btn-large" id="pauseBtn">⏸</button>
    </div>
    <div class="message-area" id="statusMsg">Start game</div>
</div>

<script>
    // LANGUAGE
    const langText = {
        en: { games:"games", new:"New", exit:"Exit", pause:"Pause", resume:"Resume", msg:"Use buttons", gameOver:"Game Over!", record:"NEW RECORD!" },
        ru: { games:"игр", new:"Новая", exit:"Выход", pause:"Пауза", resume:"Продолжить", msg:"Кнопки", gameOver:"Игра окончена!", record:"НОВЫЙ РЕКОРД!" }
    };
    let lang = 'en';

    // PLAYERS
    let players = JSON.parse(localStorage.getItem('tetris_players') || '{}');
    let currentUser = null;
    function savePlayers() { localStorage.setItem('tetris_players', JSON.stringify(players)); updateLeaderboard(); }
    function updateLeaderboard() {
        let list = Object.entries(players).map(([n,d]) => ({name:n, best:d.best||0})).sort((a,b)=>b.best-a.best).slice(0,6);
        let html = list.length ? list.map((p,i)=>`${i+1}. ${p.name} 🏆 ${p.best}`).join('<br>') : '—';
        document.getElementById('rankListLogin').innerHTML = html;
    }

    // SOUND
    function playSound(type) {
        try {
            let ctx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = ctx.createOscillator();
            let gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            if(type === 'move') { osc.frequency.value = 620; gain.gain.value = 0.08; }
            if(type === 'rotate') { osc.frequency.value = 780; gain.gain.value = 0.08; }
            if(type === 'drop') { osc.frequency.value = 350; gain.gain.value = 0.1; }
            if(type === 'clear') { osc.frequency.value = 880; gain.gain.value = 0.12; }
            osc.type = 'sine';
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.15);
            osc.stop(ctx.currentTime + 0.12);
            ctx.resume();
        } catch(e) {}
    }

    // TETRIS CORE
    const COLS = 10;
    const ROWS = 20;
    let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
    let score = 0, lines = 0, level = 1;
    let activePiece = null, nextPiece = null;
    let gameActive = false;
    let paused = false;
    let gameInterval = null;
    let repeatInterval = null;

    const pieces = [
        { shape: [[1,1,1,1]], color: '#00e5f0' },
        { shape: [[1,1],[1,1]], color: '#f0e000' },
        { shape: [[0,1,0],[1,1,1]], color: '#b470e0' },
        { shape: [[1,0,0],[1,1,1]], color: '#e0a030' },
        { shape: [[0,0,1],[1,1,1]], color: '#3060e0' },
        { shape: [[0,1,1],[1,1,0]], color: '#40e040' },
        { shape: [[1,1,0],[0,1,1]], color: '#e04040' }
    ];

    class Piece {
        constructor(pieceDef) {
            this.shape = pieceDef.shape.map(row => [...row]);
            this.color = pieceDef.color;
            this.x = Math.floor((COLS - this.shape[0].length) / 2);
            this.y = 0;
        }
        rotate() {
            let rotated = this.shape[0].map((_, idx) => this.shape.map(row => row[idx]).reverse());
            let old = this.shape;
            this.shape = rotated;
            if(this.collision()) this.shape = old;
            else playSound('rotate');
        }
        collision() {
            for(let y=0; y<this.shape.length; y++) {
                for(let x=0; x<this.shape[y].length; x++) {
                    if(this.shape[y][x]) {
                        let bx = this.x + x, by = this.y + y;
                        if(bx<0 || bx>=COLS || by>=ROWS || (by>=0 && board[by][bx])) return true;
                    }
                }
            }
            return false;
        }
        merge() {
            for(let y=0; y<this.shape.length; y++) {
                for(let x=0; x<this.shape[y].length; x++) {
                    if(this.shape[y][x]) {
                        let bx = this.x + x, by = this.y + y;
                        if(by>=0 && by<ROWS && bx>=0 && bx<COLS) board[by][bx] = this.color;
                    }
                }
            }
            let cleared = 0;
            for(let y=ROWS-1; y>=0; y--) {
                if(board[y].every(c => c !== 0)) {
                    board.splice(y,1);
                    board.unshift(Array(COLS).fill(0));
                    y++;
                    cleared++;
                }
            }
            if(cleared>0) {
                playSound('clear');
                const points = [0,100,300,600,1000];
                score += points[Math.min(4,cleared)] * level;
                lines += cleared;
                level = 1 + Math.floor(lines / 5);
                updateUI();
                if(cleared>=3) smallFireworks();
            }
            spawnNew();
            updateUI();
        }
        move(dx, dy) {
            this.x += dx; this.y += dy;
            if(this.collision()) {
                this.x -= dx; this.y -= dy;
                if(dy===1) { playSound('drop'); this.merge(); }
                return false;
            }
            if(dx !== 0) playSound('move');
            return true;
        }
        hardDrop() { while(this.move(0,1)) {} playSound('drop'); }
    }

    function spawnNew() {
        if(!nextPiece) {
            let r = Math.floor(Math.random() * pieces.length);
            nextPiece = new Piece(pieces[r]);
        }
        activePiece = new Piece(pieces.find(p => p.color === nextPiece.color) || pieces[0]);
        activePiece.shape = nextPiece.shape.map(r => [...r]);
        activePiece.color = nextPiece.color;
        let r2 = Math.floor(Math.random() * pieces.length);
        nextPiece = new Piece(pieces[r2]);
        if(activePiece.collision()) gameOver();
        drawAll();
    }

    function updateUI() {
        document.getElementById('scoreText').innerHTML = score;
        document.getElementById('linesText').innerHTML = lines;
        document.getElementById('levelDisplay').innerHTML = level;
    }

    // DRAWING
    let boardCanvas = document.getElementById('boardCanvas');
    let boardCtx = boardCanvas.getContext('2d');
    let nextCanvas = document.getElementById('nextCanvas');
    let nextCtx = nextCanvas.getContext('2d');
    const block = 20;

    function drawBoard() {
        boardCanvas.width = 200; boardCanvas.height = 400;
        boardCtx.clearRect(0,0,200,400);
        for(let y=0; y<ROWS; y++) {
            for(let x=0; x<COLS; x++) {
                if(board[y][x]) {
                    boardCtx.fillStyle = board[y][x];
                    boardCtx.fillRect(x*block, y*block, block-1, block-1);
                } else {
                    boardCtx.fillStyle = '#0a1222';
                    boardCtx.fillRect(x*block, y*block, block-1, block-1);
                }
            }
        }
        if(activePiece && !paused && gameActive) {
            for(let y=0; y<activePiece.shape.length; y++) {
                for(let x=0; x<activePiece.shape[y].length; x++) {
                    if(activePiece.shape[y][x]) {
                        let px = (activePiece.x + x) * block;
                        let py = (activePiece.y + y) * block;
                        boardCtx.fillStyle = activePiece.color;
                        boardCtx.fillRect(px, py, block-1, block-1);
                    }
                }
            }
        }
        if(paused) {
            boardCtx.fillStyle = '#000000aa';
            boardCtx.fillRect(0,0,200,400);
            boardCtx.fillStyle = '#ffffff';
            boardCtx.font = 'bold 14px monospace';
            boardCtx.fillText('PAUSED', 55, 200);
        }
    }

    function drawNext() {
        nextCanvas.width = 80; nextCanvas.height = 80;
        nextCtx.clearRect(0,0,80,80);
        if(nextPiece) {
            let shape = nextPiece.shape;
            let nb = 20;
            let startX = (80 - (shape[0].length * nb)) / 2;
            let startY = (80 - (shape.length * nb)) / 2;
            for(let y=0; y<shape.length; y++) {
                for(let x=0; x<shape[y].length; x++) {
                    if(shape[y][x]) {
                        nextCtx.fillStyle = nextPiece.color;
                        nextCtx.fillRect(startX + x*nb, startY + y*nb, nb-2, nb-2);
                    }
                }
            }
        }
    }

    function drawAll() { drawBoard(); drawNext(); }

    function startLoop() {
        if(gameInterval) clearInterval(gameInterval);
        let speed = Math.max(150, 500 - (level-1)*25);
        gameInterval = setInterval(() => {
            if(gameActive && !paused && activePiece) {
                activePiece.move(0,1);
                drawAll();
            }
        }, speed);
    }

    function pauseGame() {
        if(!gameActive) return;
        paused = !paused;
        let btn = document.getElementById('pauseBtn');
        if(paused) {
            btn.innerHTML = '▶';
            document.getElementById('statusMsg').innerHTML = langText[lang].pause;
        } else {
            btn.innerHTML = '⏸';
            document.getElementById('statusMsg').innerHTML = langText[lang].msg;
        }
        drawAll();
    }

    function newGame() {
        if(gameInterval) clearInterval(gameInterval);
        if(repeatInterval) clearInterval(repeatInterval);
        board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        score = 0; lines = 0; level = 1;
        paused = false;
        gameActive = true;
        document.getElementById('pauseBtn').innerHTML = '⏸';
        updateUI();
        let r = Math.floor(Math.random() * pieces.length);
        nextPiece = new Piece(pieces[r]);
        spawnNew();
        startLoop();
        drawAll();
        document.getElementById('statusMsg').innerHTML = langText[lang].msg;
        document.getElementById('recordBanner').style.display = 'none';
    }

    function gameOver() {
        gameActive = false;
        if(gameInterval) clearInterval(gameInterval);
        if(repeatInterval) clearInterval(repeatInterval);
        if(currentUser) {
            let best = players[currentUser]?.best || 0;
            let gamesPlayed = (players[currentUser]?.games || 0) + 1;
            players[currentUser] = { 
                best: Math.max(best, score), 
                games: gamesPlayed,
                wins: gamesPlayed
            };
            savePlayers();
            document.getElementById('winCount').innerHTML = gamesPlayed;
            
            if(score > best) {
                document.getElementById('recordBanner').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('recordBanner').style.display = 'none';
                }, 3000);
                victoryFireworks();
                document.getElementById('statusMsg').innerHTML = langText[lang].record + " 🎉";
            } else {
                document.getElementById('statusMsg').innerHTML = langText[lang].gameOver;
            }
        } else {
            document.getElementById('statusMsg').innerHTML = langText[lang].gameOver;
        }
    }

    // LONG PRESS
    function startRepeat(direction) {
        if(repeatInterval) clearInterval(repeatInterval);
        repeatInterval = setInterval(() => {
            if(gameActive && !paused && activePiece) {
                if(direction === 'left') left();
                if(direction === 'right') right();
            }
        }, 80);
    }
    function stopRepeat() {
        if(repeatInterval) clearInterval(repeatInterval);
        repeatInterval = null;
    }

    function left() { if(gameActive && !paused && activePiece) { activePiece.move(-1,0); drawAll(); } }
    function right() { if(gameActive && !paused && activePiece) { activePiece.move(1,0); drawAll(); } }
    function rotate() { if(gameActive && !paused && activePiece) { activePiece.rotate(); drawAll(); } }
    function down() { if(gameActive && !paused && activePiece) { activePiece.move(0,1); drawAll(); } }
    function hard() { if(gameActive && !paused && activePiece) { activePiece.hardDrop(); drawAll(); } }

    function smallFireworks() {
        for(let i=0;i<15;i++) {
            setTimeout(()=>{
                let d = document.createElement('div');
                d.className = 'firework';
                d.style.left = Math.random()*window.innerWidth+'px';
                d.style.top = Math.random()*window.innerHeight*0.5+'px';
                d.style.width = '6px'; d.style.height='6px';
                d.style.background = `hsl(${Math.random()*360},100%,60%)`;
                d.style.borderRadius='50%';
                d.style.position='fixed';
                d.style.animation='bang 0.5s ease-out forwards';
                document.body.appendChild(d);
                setTimeout(()=>d.remove(),500);
            }, i*30);
        }
    }
    function victoryFireworks() {
        for(let i=0;i<40;i++) {
            setTimeout(()=>{
                let d = document.createElement('div');
                d.className = 'firework';
                d.style.left = Math.random()*window.innerWidth+'px';
                d.style.top = Math.random()*window.innerHeight*0.6+'px';
                d.style.width = '10px'; d.style.height='10px';
                d.style.background = `hsl(${Math.random()*360},100%,65%)`;
                d.style.borderRadius='50%';
                d.style.position='fixed';
                d.style.animation='bang 0.7s ease-out forwards';
                document.body.appendChild(d);
                setTimeout(()=>d.remove(),700);
            }, i*40);
        }
    }

    function setLang(l) {
        lang = l;
        document.getElementById('langEnBtn').classList.toggle('active', l==='en');
        document.getElementById('langRuBtn').classList.toggle('active', l==='ru');
        document.getElementById('gamesText').innerHTML = langText[lang].games;
        document.getElementById('newGameBtn').innerHTML = langText[lang].new;
        document.getElementById('logoutBtn').innerHTML = langText[lang].exit;
        document.getElementById('statusMsg').innerHTML = langText[lang].msg;
        let pauseBtn = document.getElementById('pauseBtn');
        if(paused) pauseBtn.innerHTML = '▶';
        else pauseBtn.innerHTML = '⏸';
    }

    function login() {
        let name = document.getElementById('loginName').value.trim();
        if(!name) return;
        if(!players[name]) players[name] = { best:0, games:0 };
        currentUser = name;
        savePlayers();
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('gameUI').style.display = 'block';
        document.getElementById('userName').innerHTML = currentUser;
        document.getElementById('winCount').innerHTML = players[currentUser].games || 0;
        newGame();
        updateLeaderboard();
    }

    function logout() { location.reload(); }

    // INIT
    window.onload = () => {
        document.getElementById('loginBtn').onclick = login;
        document.getElementById('newGameBtn').onclick = () => { if(currentUser && gameActive !== undefined) newGame(); };
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('pauseBtn').onclick = pauseGame;
        document.getElementById('langEnBtn').onclick = () => setLang('en');
        document.getElementById('langRuBtn').onclick = () => setLang('ru');
        
        let leftBtn = document.getElementById('leftBtn');
        let rightBtn = document.getElementById('rightBtn');
        
        leftBtn.onclick = left;
        rightBtn.onclick = right;
        leftBtn.addEventListener('mousedown', () => startRepeat('left'));
        leftBtn.addEventListener('mouseup', stopRepeat);
        leftBtn.addEventListener('mouseleave', stopRepeat);
        leftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRepeat('left'); });
        leftBtn.addEventListener('touchend', stopRepeat);
        
        rightBtn.addEventListener('mousedown', () => startRepeat('right'));
        rightBtn.addEventListener('mouseup', stopRepeat);
        rightBtn.addEventListener('mouseleave', stopRepeat);
        rightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRepeat('right'); });
        rightBtn.addEventListener('touchend', stopRepeat);
        
        document.getElementById('rotateBtn').onclick = rotate;
        document.getElementById('downBtn').onclick = down;
        document.getElementById('hardDropBtn').onclick = hard;
        
        updateLeaderboard();
        setLang('en');
    };
</script>
</body>
</html>
