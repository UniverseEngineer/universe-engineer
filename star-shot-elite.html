<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAR SHOT: ELITE - Space Shooter</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .ui { position: absolute; top: 15px; color: #fff; font-size: 18px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; width: 100%; box-sizing: border-box; padding: 0 20px; display: flex; justify-content: space-between; }
        .level-ui { position: absolute; bottom: 15px; left: 20px; color: #0ff; font-weight: bold; z-index: 10; text-shadow: 1px 1px #000; }
        .combo-ui { position: absolute; bottom: 15px; right: 20px; color: #ff0; font-weight: bold; font-size: 24px; z-index: 10; text-shadow: 2px 2px #000; }
        .triple-ui { position: absolute; bottom: 60px; right: 20px; color: #0ff; font-weight: bold; background: #000000aa; padding: 5px 10px; border-radius: 8px; z-index: 10; font-size: 14px; }
        .controls-info { position: absolute; top: 60px; right: 20px; color: #aaa; font-size: 11px; background: #000000aa; padding: 5px 10px; border-radius: 8px; pointer-events: none; z-index: 10; }
        
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; z-index: 100; text-align: center; backdrop-filter: blur(5px); overflow-y: auto; }
        .auth-box { background: #111; padding: 30px; border-radius: 20px; border: 2px solid #0f0; min-width: 300px; }
        .auth-box input { padding: 12px; margin: 10px; font-size: 18px; background: #222; color: #0f0; border: 1px solid #0f0; border-radius: 8px; width: 250px; text-align: center; }
        .auth-box button { padding: 12px 30px; margin: 10px; font-size: 18px; background: #0f0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .auth-box .error { color: #f00; font-size: 14px; margin-top: 10px; }
        .stats-box { margin-top: 20px; padding: 15px; background: #222; border-radius: 10px; text-align: left; font-size: 14px; }
        .global-stats { margin-top: 20px; padding: 15px; background: #1a1a2e; border-radius: 10px; text-align: left; font-size: 12px; max-height: 200px; overflow-y: auto; width: 300px; }
        .global-stats h3 { margin: 0 0 10px 0; color: #ff0; text-align: center; }
        .global-stats .rank { color: #ff0; }
        
        .btn { padding: 15px 45px; margin: 15px; font-size: 22px; font-weight: bold; background: #0f0; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px #080; color: #000; }
        .boss-msg { font-size: 36px; color: #ff0; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 15px #f00; }
    </style>
</head>
<body>
    <div class="ui">
        <div>SCORE: <span id="s">0</span> | BEST: <span id="b">0</span></div>
        <div id="hearts">❤️❤️❤️</div>
    </div>
    <div class="level-ui">LEVEL: <span id="lv">1</span></div>
    <div class="combo-ui" id="combo-display" style="display:none">🔥 COMBO x<span id="combo-val">0</span></div>
    <div class="triple-ui" id="triple-timer" style="display:none">⚡ TRIPLE: <span id="tt">0</span>s</div>
    <div class="controls-info">🖱️ Mouse / 🎮 Arrow Keys | P - Pause</div>
    
    <div id="login-menu" class="overlay">
        <div class="auth-box">
            <h1>⭐ STAR SHOT: ELITE ⭐</h1>
            <input type="text" id="login-username" placeholder="Enter Username" autocomplete="off">
            <div>
                <button onclick="loginOrRegister()">PLAY NOW</button>
            </div>
            <div id="login-error" class="error"></div>
            <div class="global-stats" id="global-stats-login">
                <h3>🌍 GLOBAL LEADERBOARD</h3>
                <div id="leaderboard-list">Loading...</div>
            </div>
        </div>
    </div>
    
    <div id="game-menu" class="overlay" style="display:none">
        <h1 id="welcome-msg"></h1>
        <div id="stats-display" class="stats-box"></div>
        <div id="boss-msg" class="boss-msg" style="display:none">BOSS DESTROYED!</div>
        <div id="final-score" style="display:none; font-size: 24px; color: #ff0; margin-bottom:10px;"></div>
        <div id="achievements" style="margin: 10px 0; font-size: 12px; color: #ff0;"></div>
        <button id="start-btn" class="btn" onclick="startGame()">🚀 START MISSION</button>
        <button class="btn" onclick="logout()" style="background:#f00; box-shadow:0 4px #800;">LOG OUT</button>
        <div class="global-stats" id="global-stats-game">
            <h3>🌍 GLOBAL LEADERBOARD</h3>
            <div id="leaderboard-list-game">Loading...</div>
        </div>
    </div>
    
    <canvas id="c"></canvas>

<script>
    // ============ DEVICE ID + PLAYER SYSTEM ============
    function getDeviceId() {
        let deviceId = localStorage.getItem('device_id');
        if(!deviceId) {
            deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('device_id', deviceId);
        }
        return deviceId;
    }
    
    const DEVICE_ID = getDeviceId();
    let players = JSON.parse(localStorage.getItem('star_players') || '{}');
    let currentUser = null;
    
    function savePlayers() { localStorage.setItem('star_players', JSON.stringify(players)); }
    
    function updateGlobalLeaderboard() {
        let leaderboard = [];
        for(let name in players) {
            leaderboard.push({ name: name, highScore: players[name].stats.highScore, bossKills: players[name].stats.bossKills });
        }
        leaderboard.sort((a,b) => b.highScore - a.highScore);
        let top10 = leaderboard.slice(0, 10);
        
        let html = '';
        for(let i=0; i<top10.length; i++) {
            let medal = '';
            if(i === 0) medal = '👑 ';
            else if(i === 1) medal = '🥈 ';
            else if(i === 2) medal = '🥉 ';
            else medal = `${i+1}. `;
            html += `<div><span class="rank">${medal}</span> ${top10[i].name}: <span style="color:#0f0">${top10[i].highScore}</span> pts (💀 ${top10[i].bossKills})</div>`;
        }
        if(top10.length === 0) html = '<div>No players yet!</div>';
        
        document.getElementById('leaderboard-list').innerHTML = html;
        if(document.getElementById('leaderboard-list-game')) {
            document.getElementById('leaderboard-list-game').innerHTML = html;
        }
    }
    
    function loginOrRegister() {
        let username = document.getElementById('login-username').value.trim();
        if(!username) {
            document.getElementById('login-error').innerText = 'Please enter a username!';
            return;
        }
        
        if(players[username]) {
            if(players[username].deviceId === DEVICE_ID) {
                currentUser = username;
                showGameMenu();
            } else {
                document.getElementById('login-error').innerHTML = '❌ This username is already used on another device!';
            }
        } else {
            players[username] = {
                deviceId: DEVICE_ID,
                createdAt: new Date().toISOString(),
                stats: {
                    totalScore: 0,
                    gamesPlayed: 0,
                    bossKills: 0,
                    highScore: 0,
                    totalEnemies: 0,
                    maxCombo: 0
                }
            };
            savePlayers();
            currentUser = username;
            showGameMenu();
        }
        updateGlobalLeaderboard();
    }
    
    function showGameMenu() {
        document.getElementById('login-menu').style.display = 'none';
        document.getElementById('game-menu').style.display = 'flex';
        document.getElementById('welcome-msg').innerHTML = `👨‍🚀 WELCOME, ${currentUser.toUpperCase()}! 👩‍🚀`;
        updateStatsDisplay();
        updateAchievements();
        document.getElementById('b').innerText = players[currentUser].stats.highScore;
        updateGlobalLeaderboard();
    }
    
    function logout() {
        currentUser = null;
        document.getElementById('game-menu').style.display = 'none';
        document.getElementById('login-menu').style.display = 'flex';
        document.getElementById('login-username').value = '';
        document.getElementById('login-error').innerText = '';
        state = "MENU";
        updateGlobalLeaderboard();
    }
    
    function updateStatsDisplay() {
        let s = players[currentUser].stats;
        document.getElementById('stats-display').innerHTML = `
            🏆 HIGH SCORE: ${s.highScore}<br>
            🎮 GAMES PLAYED: ${s.gamesPlayed}<br>
            💀 BOSS KILLS: ${s.bossKills}<br>
            👾 ENEMIES DEFEATED: ${s.totalEnemies}<br>
            🔥 MAX COMBO: ${s.maxCombo}
        `;
    }
    
    function updateAchievements() {
        let s = players[currentUser].stats;
        let ach = [];
        if(s.bossKills >= 1) ach.push("🏅 First Blood");
        if(s.bossKills >= 5) ach.push("⭐ Boss Hunter");
        if(s.highScore >= 2000) ach.push("🚀 Elite Pilot");
        if(s.maxCombo >= 50) ach.push("⚡ Combo Master");
        if(s.totalEnemies >= 100) ach.push("👑 Annihilator");
        document.getElementById('achievements').innerHTML = ach.length ? "🏆 ACHIEVEMENTS: " + ach.join(" • ") : "";
    }
    
    function updatePlayerStats(scoreGained, enemiesKilled, bossKilled, combo) {
        if(!currentUser) return;
        let stats = players[currentUser].stats;
        stats.totalScore += scoreGained;
        stats.gamesPlayed++;
        if(scoreGained > stats.highScore) stats.highScore = scoreGained;
        stats.totalEnemies += enemiesKilled;
        if(bossKilled) stats.bossKills++;
        if(combo > stats.maxCombo) stats.maxCombo = combo;
        savePlayers();
        if(scoreGained > stats.highScore) document.getElementById('b').innerText = stats.highScore;
        updateGlobalLeaderboard();
    }
    
    // ============ GAME VARIABLES ============
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    
    let score = 0, best = 0, lives = 3, state = "MENU", level = 1;
    let ship = { x: canvas.width/2, y: canvas.height-120, shield: false, shieldEnd: 0 };
    let bullets = [], enemies = [], powerups = [], bBullets = [], particles = [], stars = [], trails = [];
    let boss = { active: false, x: 0, hp: 35, maxHp: 35, dir: 1, lastShot: 0, flash: 0, phase: 1, nextThreshold: 500, type: 1 };
    let tripleTime = 0, lastS = 0, isShooting = false, shake = 0, flashRed = 0, audioCtx = null;
    let spawnRate = 0.02, enemySpeed = 3, paused = false, combo = 0, comboTime = 0;
    let keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };
    let mouseX = ship.x, mouseY = ship.y;
    let gameEnemiesKilled = 0, gameBossKilled = false;
    
    for(let i=0; i<100; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2+1, v: 1+Math.random()*3, twinkle: Math.random()*Math.PI*2});
    
    function initAudio() {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioCtx.resume();
        }
    }
    
    function playSound(freq, type, dur, vol) {
        if(!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        } catch(e) {}
    }
    
    function createExplosion(x, y, color, count=18, pSize=5, big=false) {
        if(big) {
            playSound(100, 'sawtooth', 0.6, 0.25);
            playSound(200, 'square', 0.4, 0.15);
            for(let i=0; i<45; i++) {
                particles.push({ x, y, vx:(Math.random()-0.5)*12, vy:(Math.random()-0.5)*12 - 4, life:1.0, color: `hsl(${Math.random()*60 + 300}, 100%, 60%)`, size: Math.random()*7+2 });
            }
            particles.push({x, y, vx:0, vy:0, life:1.0, color:"#fff", size:35, shockwave:true});
        } else {
            playSound(180, 'sawtooth', 0.15, 0.08);
            for(let i=0; i<count; i++) {
                particles.push({ x, y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, life:0.8+Math.random()*0.4, color: color || `hsl(${Math.random()*60 + 20}, 100%, 55%)`, size: Math.random()*pSize+2 });
            }
        }
    }
    
    function startGame() {
        initAudio();
        if(state === "MENU" || state === "GAMEOVER") {
            score = 0; lives = 3; level = 1; spawnRate = 0.02; enemySpeed = 3; combo = 0; comboTime = 0;
            boss.nextThreshold = 500; tripleTime = 0; ship.shield = false; ship.shieldEnd = 0;
            enemies = []; powerups = []; bBullets = []; gameEnemiesKilled = 0; gameBossKilled = false;
        } else if(state === "BOSSWIN") {
            level++; 
            spawnRate = Math.min(0.04, 0.02 + (level-1) * 0.003);
            enemySpeed = Math.min(6, 3 + (level-1) * 0.4);
            boss.nextThreshold = score + 1000;
        }
        bullets = []; particles = []; trails = []; boss.active = false; state = "PLAY"; paused = false;
        document.getElementById('game-menu').style.display = "none";
        document.getElementById('boss-msg').style.display = "none";
        document.getElementById('final-score').style.display = "none";
        document.getElementById('lv').innerText = level;
        updateHearts();
        document.getElementById('triple-timer').style.display = "none";
        document.getElementById('combo-display').style.display = "none";
    }
    
    function gameOver() {
        state = "GAMEOVER";
        updatePlayerStats(score, gameEnemiesKilled, gameBossKilled, combo);
        updateStatsDisplay();
        updateAchievements();
        document.getElementById('game-menu').style.display = "flex";
        document.getElementById('final-score').style.display = "block";
        document.getElementById('final-score').innerHTML = `💀 GAME OVER 💀<br>SCORE: ${score}<br>COMBO: x${combo}`;
        document.getElementById('start-btn').innerHTML = "🔄 RETRY MISSION";
        document.getElementById('b').innerText = players[currentUser].stats.highScore;
        updateGlobalLeaderboard();
    }
    
    function updateHearts() {
        let h = ""; for(let i=0; i<lives; i++) h += "❤️";
        document.getElementById('hearts').innerHTML = h;
    }
    
    function handleHit() {
        if(ship.shield && Date.now() < ship.shieldEnd) {
            ship.shield = false; playSound(800, 'sine', 0.2, 0.12);
        } else {
            lives--; shake = 15; flashRed = 4; combo = 0; playSound(120, 'sawtooth', 0.35, 0.2); updateHearts();
            if(lives <= 0) gameOver();
        }
    }
    
    function shoot() {
        if(!isShooting || state !== "PLAY") return;
        let now = Date.now();
        if(now - lastS > 140) {
            playSound(450, 'square', 0.07, 0.04);
            if(now < tripleTime) {
                bullets.push({x: ship.x, y: ship.y-35, vx: 0, vy: -14});
                bullets.push({x: ship.x-16, y: ship.y-25, vx: -2, vy: -14});
                bullets.push({x: ship.x+16, y: ship.y-25, vx: 2, vy: -14});
            } else {
                bullets.push({x: ship.x, y: ship.y-35, vx: 0, vy: -14});
            }
            lastS = now;
        }
    }
    
    function updateMovement() {
        let speed = 8.5;
        if(keys.ArrowLeft && ship.x > 35) ship.x -= speed;
        if(keys.ArrowRight && ship.x < canvas.width - 35) ship.x += speed;
        if(keys.ArrowUp && ship.y > 80) ship.y -= speed;
        if(keys.ArrowDown && ship.y < canvas.height - 60) ship.y += speed;
        ship.x = mouseX;
        ship.y = Math.min(canvas.height - 60, Math.max(80, mouseY));
    }
    
    // ============ ENEMY DRAWING ============
    function drawEnemy(e) {
        ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(e.rot || 0);
        if(e.type === 'scout') {
            ctx.fillStyle = "#d4af37";
            ctx.shadowBlur = 8; ctx.shadowColor = "#d4af37";
            ctx.beginPath(); ctx.moveTo(0, -e.r); ctx.lineTo(-e.r*0.7, e.r*0.6); ctx.lineTo(0, e.r*0.3); ctx.lineTo(e.r*0.7, e.r*0.6); ctx.closePath(); ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(0, -e.r*0.3, 3, 0, Math.PI*2); ctx.fill();
        } else if(e.type === 'tank') {
            ctx.fillStyle = "#ff8844";
            ctx.shadowBlur = 6; ctx.shadowColor = "#ff8844";
            ctx.beginPath(); ctx.ellipse(0, 0, e.r, e.r*0.7, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ffaa66";
            ctx.beginPath(); ctx.ellipse(0, -e.r*0.25, e.r*0.5, e.r*0.35, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(-e.r*0.25, -e.r*0.2, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(e.r*0.25, -e.r*0.2, 3, 0, Math.PI*2); ctx.fill();
        } else {
            let gradient = ctx.createLinearGradient(-e.r*0.4, -e.r*0.4, e.r*0.4, e.r*0.4);
            gradient.addColorStop(0, "#ff3366");
            gradient.addColorStop(1, "#cc0044");
            ctx.fillStyle = gradient;
            ctx.shadowBlur = 6; ctx.shadowColor = "#ff3366";
            ctx.beginPath(); ctx.ellipse(0, 0, e.r, e.r*0.65, 0, 0, Math.PI*2); ctx.fill();
            for(let i=0; i<5; i++) {
                let angle = (i/5)*Math.PI*2;
                ctx.fillStyle = "#ff6666";
                ctx.beginPath(); ctx.moveTo(Math.cos(angle)*e.r*0.7, Math.sin(angle)*e.r*0.55);
                ctx.lineTo(Math.cos(angle+0.25)*e.r*1.0, Math.sin(angle+0.25)*e.r*0.8);
                ctx.lineTo(Math.cos(angle-0.25)*e.r*1.0, Math.sin(angle-0.25)*e.r*0.8);
                ctx.fill();
            }
            ctx.fillStyle = "#ffff00";
            ctx.beginPath(); ctx.arc(0, -e.r*0.2, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000";
            ctx.beginPath(); ctx.arc(0, -e.r*0.2, 1.5, 0, Math.PI*2); ctx.fill();
        }
        ctx.shadowBlur = 0;
        ctx.restore();
    }
    
    // ============ DIFFERENT BOSSES ============
    function drawBoss(x, y) {
        ctx.save(); ctx.translate(x, y);
        ctx.shadowBlur = 20; ctx.shadowColor = "#ff0000";
        
        let bossType = ((level - 1) % 3) + 1;
        
        if(bossType === 1) {
            let gradient = ctx.createLinearGradient(-60, -20, 60, 20);
            gradient.addColorStop(0, "#990000");
            gradient.addColorStop(0.5, "#ff3333");
            gradient.addColorStop(1, "#990000");
            ctx.fillStyle = boss.flash > 0 ? "#ffffff" : gradient;
            ctx.beginPath(); ctx.ellipse(0, 0, 65, 40, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ffaa00";
            ctx.beginPath(); ctx.ellipse(0, 0, 22, 18, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ff6600";
            ctx.beginPath(); ctx.ellipse(0, -3, 10, 8, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#cc0000";
            ctx.beginPath(); ctx.moveTo(-65, -10); ctx.lineTo(-95, -30); ctx.lineTo(-65, 0); ctx.fill();
            ctx.beginPath(); ctx.moveTo(65, -10); ctx.lineTo(95, -30); ctx.lineTo(65, 0); ctx.fill();
            ctx.fillStyle = "#555555";
            ctx.fillRect(-40, -18, 16, 8);
            ctx.fillRect(24, -18, 16, 8);
            ctx.fillStyle = "#00ffff";
            ctx.beginPath(); ctx.arc(-22, -7, 5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(22, -7, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000000";
            ctx.beginPath(); ctx.arc(-22, -8, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(22, -8, 2, 0, Math.PI*2); ctx.fill();
        } 
        else if(bossType === 2) {
            let gradient = ctx.createLinearGradient(-60, -20, 60, 20);
            gradient.addColorStop(0, "#660066");
            gradient.addColorStop(0.5, "#cc33ff");
            gradient.addColorStop(1, "#660066");
            ctx.fillStyle = boss.flash > 0 ? "#ffffff" : gradient;
            ctx.beginPath(); ctx.ellipse(0, 0, 70, 45, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ff44ff";
            ctx.beginPath(); ctx.ellipse(0, 0, 25, 20, 0, 0, Math.PI*2); ctx.fill();
            for(let i=0; i<4; i++) {
                let angle = (i/4)*Math.PI*2;
                ctx.fillStyle = "#aa44ff";
                ctx.beginPath(); ctx.moveTo(Math.cos(angle)*60, Math.sin(angle)*35);
                ctx.lineTo(Math.cos(angle+0.4)*85, Math.sin(angle+0.4)*45);
                ctx.lineTo(Math.cos(angle-0.4)*85, Math.sin(angle-0.4)*45);
                ctx.fill();
            }
            ctx.fillStyle = "#88ff88";
            ctx.beginPath(); ctx.arc(-20, -8, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(20, -8, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000";
            ctx.beginPath(); ctx.arc(-20, -9, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(20, -9, 2.5, 0, Math.PI*2); ctx.fill();
        } 
        else {
            let gradient = ctx.createLinearGradient(-60, -20, 60, 20);
            gradient.addColorStop(0, "#003366");
            gradient.addColorStop(0.5, "#33aaff");
            gradient.addColorStop(1, "#003366");
            ctx.fillStyle = boss.flash > 0 ? "#ffffff" : gradient;
            ctx.beginPath(); ctx.ellipse(0, 0, 68, 42, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#00ffff";
            ctx.beginPath(); ctx.ellipse(0, 0, 20, 16, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#aaaaff";
            ctx.fillRect(-50, -15, 18, 8);
            ctx.fillRect(32, -15, 18, 8);
            ctx.fillRect(-45, 8, 16, 7);
            ctx.fillRect(29, 8, 16, 7);
            ctx.fillStyle = "#ffff00";
            ctx.beginPath(); ctx.rect(-25, -12, 10, 8); ctx.fill();
            ctx.beginPath(); ctx.rect(15, -12, 10, 8); ctx.fill();
            ctx.fillStyle = "#00ff00";
            ctx.beginPath(); ctx.arc(-20, -6, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(20, -6, 4, 0, Math.PI*2); ctx.fill();
        }
        
        ctx.shadowBlur = 0;
        ctx.restore();
    }
    
    function drawShip(x, y) {
        ctx.save(); ctx.translate(x, y);
        if(isShooting) {
            ctx.fillStyle = Math.random() > 0.5 ? "#ff4400" : "#ffaa00";
            ctx.beginPath(); ctx.moveTo(-10, 12); ctx.lineTo(0, 35 + Math.random()*10); ctx.lineTo(10, 12); ctx.fill();
            trails.push({x: ship.x + (Math.random()-0.5)*12, y: ship.y + 18, r: 6, life: 1.0});
        }
        if(ship.shield && Date.now() < ship.shieldEnd) {
            ctx.strokeStyle = "#ffcc00"; ctx.lineWidth = 3; ctx.setLineDash([6, 6]);
            ctx.beginPath(); ctx.arc(0, -10, 48, 0, Math.PI*2); ctx.stroke();
            ctx.setLineDash([]);
        }
        ctx.fillStyle = "#33ff33"; ctx.shadowBlur = 10; ctx.shadowColor = "#33ff33";
        ctx.beginPath(); ctx.moveTo(0, -45); ctx.lineTo(-22, 18); ctx.lineTo(-12, 12); ctx.lineTo(12, 12); ctx.lineTo(22, 18); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#00ffff"; ctx.beginPath(); ctx.arc(0, -12, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(-3, -14, 2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#228822";
        ctx.fillRect(-24, 3, 5, 18);
        ctx.fillRect(19, 3, 5, 18);
        ctx.shadowBlur = 0;
        ctx.restore();
    }
    
    function getBossAttackPattern() {
        let bossType = ((level - 1) % 3) + 1;
        // Max 3 bullets per shot!
        if(bossType === 1) {
            return { shootDelay: 1300, bulletSpeed: 7, bulletCount: 2, spread: 0.8 };
        } else if(bossType === 2) {
            return { shootDelay: 1150, bulletSpeed: 7.5, bulletCount: 3, spread: 1.0 };
        } else {
            return { shootDelay: 1000, bulletSpeed: 8, bulletCount: 3, spread: 1.2 };
        }
    }
    
    function getBossHP() {
        let baseHP = 35;
        // HP increases with each level
        return baseHP + Math.floor(level * 3);
    }
    
    function getBossMoveSpeed() {
        let baseSpeed = 2.5;
        return Math.min(4.5, baseSpeed + (level-1) * 0.2);
    }
    
    // Main game loop
    function loop() {
        if(paused && state === "PLAY") {
            ctx.fillStyle = "#000000cc"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff"; ctx.font = "bold 40px Arial"; ctx.textAlign = "center";
            ctx.fillText("⏸ PAUSED", canvas.width/2, canvas.height/2);
            requestAnimationFrame(loop);
            return;
        }
        
        ctx.save();
        if(shake > 0) { ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); shake *= 0.9; }
        ctx.fillStyle = "#03081a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if(flashRed > 0) { ctx.fillStyle = `rgba(255, 0, 0, ${flashRed/8})`; ctx.fillRect(0, 0, canvas.width, canvas.height); flashRed--; }
        
        stars.forEach(s => { 
            s.y += s.v; 
            if(s.y > canvas.height) s.y = 0;
            let twinkle = Math.sin(Date.now() * 0.003 + s.twinkle) * 0.3 + 0.7;
            ctx.fillStyle = `rgba(255,255,255,${twinkle * 0.8})`;
            ctx.fillRect(s.x, s.y, s.s, s.s);
        });
        
        if(state === "PLAY") {
            document.getElementById('s').innerHTML = score;
            updateMovement();
            if(isShooting) shoot();
            
            if(combo > 0) {
                if(Date.now() > comboTime) combo = 0;
                document.getElementById('combo-display').style.display = "block";
                document.getElementById('combo-val').innerHTML = combo;
            } else {
                document.getElementById('combo-display').style.display = "none";
            }
            
            if(tripleTime > 0 && Date.now() > tripleTime) tripleTime = 0;
            if(tripleTime > 0) {
                document.getElementById('triple-timer').style.display = "block";
                document.getElementById('tt').innerHTML = Math.ceil((tripleTime - Date.now())/1000);
            } else {
                document.getElementById('triple-timer').style.display = "none";
            }
            if(ship.shield && Date.now() > ship.shieldEnd) ship.shield = false;
            
            trails.forEach((t, i) => {
                ctx.fillStyle = `rgba(255, 100, 0, ${t.life * 0.6})`;
                ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.fill();
                t.y += 2; t.life -= 0.04; if(t.life <= 0) trails.splice(i, 1);
            });
            
            if(!boss.active && score >= boss.nextThreshold) { 
                boss.active = true; 
                boss.hp = getBossHP();
                boss.maxHp = boss.hp;
                boss.x = canvas.width/2; 
                boss.phase = 1;
                enemies = []; 
                bBullets = []; 
                playSound(200, 'sawtooth', 0.5, 0.25);
            }
            
            // Enemy spawn
            if(!boss.active && Math.random() < spawnRate) {
                let r = Math.random();
                let enemy;
                if(r < 0.55) {
                    enemy = { x: Math.random()*canvas.width, y: -50, r: 22, v: enemySpeed, hp: 1, points: 10, type: 'normal', rot: 0, rotSpeed: (Math.random()-0.5)*0.04 };
                } else if(r < 0.8) {
                    enemy = { x: Math.random()*canvas.width, y: -50, r: 30, v: enemySpeed * 0.7, hp: 2, points: 20, type: 'tank', rot: 0, rotSpeed: (Math.random()-0.5)*0.025 };
                } else {
                    enemy = { x: Math.random()*canvas.width, y: -50, r: 18, v: enemySpeed * 1.3, hp: 1, points: 15, type: 'scout', rot: 0, rotSpeed: (Math.random()-0.5)*0.06 };
                }
                enemies.push(enemy);
            }
            
            // Powerups
            if(!boss.active && Math.random() < 0.001) powerups.push({x: Math.random()*canvas.width, y: -30, type: 'triple'});
            if(!boss.active && Math.random() < 0.0008) powerups.push({x: Math.random()*canvas.width, y: -30, type: 'shield'});
            if(lives < 3 && !boss.active && Math.random() < 0.0012) powerups.push({x: Math.random()*canvas.width, y: -30, type: 'life'});
            if(Math.random() < 0.0004) powerups.push({x: Math.random()*canvas.width, y: -30, type: 'nuke'});
            
            bullets.forEach((b, i) => {
                b.y += b.vy; b.x += b.vx;
                ctx.fillStyle = (Date.now() < tripleTime) ? "#00ffff" : "#ffff00";
                ctx.fillRect(b.x-2.5, b.y, 5, 16);
                if(boss.active && b.y < 130 && b.x > boss.x-75 && b.x < boss.x+75) {
                    boss.hp--; boss.flash = 4; bullets.splice(i, 1); playSound(350, 'sine', 0.05, 0.08);
                    if(boss.hp <= 0) { 
                        gameBossKilled = true;
                        bBullets = [];
                        createExplosion(boss.x, 65, null, 0, 0, true);
                        for(let k=0; k<4; k++) setTimeout(() => createExplosion(boss.x + (Math.random()-0.5)*120, 65 + (Math.random()-0.5)*50, "#ff00ff", 18, 5), k*120);
                        score += 400 + level * 50;
                        combo += 20;
                        comboTime = Date.now() + 3000;
                        state = "BOSSWIN";
                        setTimeout(() => {
                            document.getElementById('game-menu').style.display = "flex";
                            document.getElementById('boss-msg').style.display = "block";
                            document.getElementById('start-btn').innerHTML = "⬆️ NEXT MISSION ⬆️";
                        }, 800);
                    }
                }
                if(b.y < 0) bullets.splice(i, 1);
            });
            
            if(boss.active && boss.hp > 0) {
                let pattern = getBossAttackPattern();
                boss.x += getBossMoveSpeed() * boss.dir;
                if(boss.x < 100 || boss.x > canvas.width-100) boss.dir *= -1;
                drawBoss(boss.x, 65);
                
                ctx.fillStyle = "#330000"; ctx.fillRect(boss.x-70, 28, 140, 12);
                ctx.fillStyle = boss.phase == 2 ? "#ff8800" : "#00ff00";
                ctx.fillRect(boss.x-70, 28, (boss.hp/boss.maxHp)*140, 12);
                // Show HP number
                ctx.fillStyle = "#fff"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
                ctx.fillText(`${Math.ceil(boss.hp)}/${boss.maxHp}`, boss.x, 43);
                
                let now = Date.now();
                let shootDelay = (boss.phase == 2) ? pattern.shootDelay * 0.7 : pattern.shootDelay;
                if(now - boss.lastShot > shootDelay) { 
                    for(let i=0; i<pattern.bulletCount; i++) {
                        let offset = (i - (pattern.bulletCount-1)/2) * pattern.spread;
                        bBullets.push({x: boss.x - 20 + i*20, y: 95, vx: offset * 0.5, vy: pattern.bulletSpeed});
                    }
                    boss.lastShot = now;
                    playSound(550, 'sine', 0.1, 0.06);
                }
                
                if(boss.hp < boss.maxHp * 0.4 && boss.phase == 1) {
                    boss.phase = 2;
                    createExplosion(boss.x, 65, "#ff0000", 20, 4);
                    playSound(350, 'sawtooth', 0.3, 0.2);
                }
            }
            
            bBullets.forEach((bb, i) => {
                bb.y += bb.vy; bb.x += bb.vx || 0;
                ctx.fillStyle = "#ff4444"; ctx.shadowBlur = 5; ctx.shadowColor = "#ff0000";
                ctx.fillRect(bb.x-3, bb.y, 6, 18);
                if(Math.hypot(bb.x-ship.x, bb.y-ship.y) < 38) { handleHit(); bBullets.splice(i, 1); }
                if(bb.y > canvas.height) bBullets.splice(i, 1);
            });
            ctx.shadowBlur = 0;
            
            enemies.forEach((e, i) => {
                e.y += e.v;
                e.rot = (e.rot || 0) + (e.rotSpeed || 0.04);
                drawEnemy(e);
                
                if(Math.hypot(e.x-ship.x, e.y-ship.y) < e.r+18) { handleHit(); enemies.splice(i, 1); }
                
                bullets.forEach((b, bi) => { 
                    if(Math.hypot(e.x-b.x, e.y-b.y) < e.r) { 
                        e.hp--;
                        if(e.hp <= 0) {
                            createExplosion(e.x, e.y, e.type == 'tank' ? "#ff8844" : "#ff3366");
                            enemies.splice(i, 1);
                            let gain = e.points;
                            score += gain;
                            gameEnemiesKilled++;
                            combo++;
                            comboTime = Date.now() + 2500;
                            playSound(450, 'square', 0.07, 0.05);
                        }
                        bullets.splice(bi, 1);
                    }
                });
            });
            
            powerups.forEach((p, i) => {
                p.y += 3.5;
                ctx.shadowBlur = 6;
                if(p.type === 'triple') { ctx.fillStyle = "#00ffff"; ctx.shadowColor = "#00ffff"; }
                else if(p.type === 'shield') { ctx.fillStyle = "#ffcc00"; ctx.shadowColor = "#ffcc00"; }
                else if(p.type === 'life') { ctx.fillStyle = "#ff3333"; ctx.shadowColor = "#ff3333"; }
                else { ctx.fillStyle = "#ffffff"; ctx.shadowColor = "#ffffff"; }
                
                ctx.beginPath();
                if(p.type === 'life') { ctx.arc(p.x, p.y, 13, 0, Math.PI*2); }
                else { ctx.fillRect(p.x-11, p.y-11, 22, 22); }
                ctx.fill();
                if(p.type === 'nuke') { ctx.fillStyle = "#000"; ctx.font = "bold 16px Arial"; ctx.fillText("💣", p.x-7, p.y+6); }
                
                if(Math.hypot(p.x-ship.x, p.y-ship.y) < 38) { 
                    if(p.type === 'triple') tripleTime = Date.now() + 10000;
                    else if(p.type === 'shield') { ship.shield = true; ship.shieldEnd = Date.now() + 8000; }
                    else if(p.type === 'life') { if(lives < 3) lives++; updateHearts(); playSound(500, 'sine', 0.2, 0.15); }
                    else if(p.type === 'nuke') { 
                        enemies.forEach(e => { createExplosion(e.x, e.y, "#ff3366", 12, 3); score += 15; });
                        enemies = [];
                        playSound(120, 'sawtooth', 0.5, 0.15);
                    }
                    playSound(700, 'sine', 0.18, 0.1); powerups.splice(i, 1); 
                }
            });
            ctx.shadowBlur = 0;
            
            particles.forEach((p, i) => {
                if(p.shockwave) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = "#ffaa00";
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (1 - p.life), 0, Math.PI*2);
                    ctx.fill();
                    p.life -= 0.04;
                    if(p.life <= 0) particles.splice(i, 1);
                } else {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    if(p.life <= 0) particles.splice(i, 1);
                }
            });
            ctx.globalAlpha = 1.0;
            drawShip(ship.x, ship.y);
        }
        ctx.restore();
        requestAnimationFrame(loop);
    }
    
    canvas.addEventListener('mousemove', (e) => { if(state === "PLAY") { mouseX = e.clientX; mouseY = e.clientY - 60; } });
    canvas.addEventListener('mousedown', (e) => { e.preventDefault(); if(state === "PLAY") isShooting = true; });
    window.addEventListener('mouseup', () => isShooting = false);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isShooting = true; if(state === "PLAY") { let t = e.touches[0]; mouseX = t.clientX; mouseY = t.clientY - 60; } });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(state === "PLAY") { let t = e.touches[0]; mouseX = t.clientX; mouseY = t.clientY - 60; } });
    canvas.addEventListener('touchend', () => isShooting = false);
    window.addEventListener('keydown', (e) => { 
        if(e.code === 'Space') { e.preventDefault(); isShooting = true; }
        if(keys.hasOwnProperty(e.key)) keys[e.key] = true;
        if(e.key === 'p' || e.key === 'P') { if(state === "PLAY") paused = !paused; }
    });
    window.addEventListener('keyup', (e) => { 
        if(e.code === 'Space') isShooting = false;
        if(keys.hasOwnProperty(e.key)) keys[e.key] = false;
    });
    
    document.getElementById('b').innerText = best;
    updateGlobalLeaderboard();
    loop();
</script>
</body>
</html>
